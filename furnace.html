<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLAS / furnace</title>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 3rem 2rem;
        }

        header {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }

        .logo { font-size: 1.1rem; font-weight: 700; }
        .slash { color: #fff; font-weight: 900; }
        .sub { color: #555; font-weight: 400; }

        #auth {
            max-width: 320px;
            margin: 10vh auto;
            text-align: center;
        }

        #auth input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            font-size: 1rem;
            border-radius: 4px;
            margin-bottom: 0.75rem;
            outline: none;
        }

        #auth input:focus { border-color: #555; }

        button {
            padding: 0.75rem 2rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { background: #e0e0e0; }

        #app { display: none; }

        #upload-btn {
            margin-bottom: 3rem;
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 4rem;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .gallery-item .delete-btn {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(180,0,0,0.75);
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .gallery-item:hover .delete-btn { opacity: 1; }

        .empty { color: #444; font-size: 0.9rem; }

        #status {
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            min-height: 1.2em;
        }

        .error-msg   { color: #ff4444; }
        .success-msg { color: #44cc88; }

        /* Glass settings panel */
        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
            margin-bottom: 1.5rem;
        }

        .sliders {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem 2.5rem;
            margin-bottom: 2rem;
        }

        .slider-row {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #999;
        }

        .slider-label span { color: #e0e0e0; font-variant-numeric: tabular-nums; }

        input[type="range"] {
            width: 100%;
            accent-color: #fff;
            cursor: pointer;
            height: 2px;
            background: #333;
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        .glass-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        #save-btn { background: #fff; color: #000; }
        #reset-btn { background: transparent; color: #555; border: 1px solid #333; }
        #reset-btn:hover { background: #1a1a1a; color: #e0e0e0; }

        #cfg-status {
            font-size: 0.85rem;
            color: #888;
            min-height: 1.2em;
        }

        /* Glass preview */
        :root {
            --preview-tinting: 0.16;
            --preview-edge-spec: 0.18;
        }

        #preview-wrap {
            position: relative;
            width: 100%;
            height: 260px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        #preview-bg {
            position: absolute;
            inset: 0;
        }

        #preview-center {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        #preview-center::before {
            content: 'GLAS';
            position: absolute;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 2px rgba(160, 220, 255, var(--preview-edge-spec));
            filter: blur(0.5px);
            pointer-events: none;
        }

        #preview-glas {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            user-select: none;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: rgba(255, 255, 255, var(--preview-tinting));
            -webkit-text-stroke: 1px rgba(200, 235, 255, 0.12);
            background-repeat: no-repeat;
            filter: url(#preview-glass);
        }

        .pattern-btns {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
        }

        .pattern-btn {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 0;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .pattern-btn.active { border-color: #fff; }

        /* Quill dark overrides */
        .ql-toolbar.ql-snow {
            border: 1px solid #333;
            background: #1a1a1a;
            border-radius: 4px 4px 0 0;
        }
        .ql-container.ql-snow {
            border: 1px solid #333;
            border-top: none;
            background: #111;
            border-radius: 0 0 4px 4px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .ql-editor { color: #e0e0e0; font-size: 0.95rem; line-height: 1.6; min-height: 220px; }
        .ql-editor.ql-blank::before { color: #444; font-style: normal; }
        .ql-toolbar.ql-snow .ql-stroke { stroke: #999; }
        .ql-toolbar.ql-snow .ql-fill  { fill: #999; }
        .ql-toolbar.ql-snow .ql-picker { color: #999; }
        .ql-toolbar.ql-snow button:hover .ql-stroke,
        .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: #fff; }
        .ql-toolbar.ql-snow .ql-picker-options { background: #1a1a1a; border-color: #333; }
        .ql-toolbar.ql-snow .ql-picker-item:hover { color: #fff; }
        .ql-toolbar.ql-snow .ql-color-picker .ql-picker-options { background: #1a1a1a; border-color: #333; padding: 4px; }
        .ql-toolbar.ql-snow .ql-font .ql-picker-label,
        .ql-toolbar.ql-snow .ql-color .ql-picker-label { color: #999; border-color: #333; }
        /* Sections manager */
        .section-tabs {
            display: flex;
            align-items: stretch;
            gap: 0;
            border-bottom: 1px solid #2a2a2a;
            overflow-x: auto;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }
        .section-tabs::-webkit-scrollbar { display: none; }

        .section-tab {
            padding: 0.55rem 1.1rem !important;
            background: transparent !important;
            color: #555 !important;
            border: none !important;
            border-bottom: 2px solid transparent !important;
            border-radius: 0 !important;
            font-size: 0.82rem !important;
            font-weight: 400 !important;
            cursor: pointer !important;
            white-space: nowrap;
            margin-bottom: -1px;
            width: auto !important;
            height: auto !important;
            min-width: unset !important;
        }
        .section-tab:hover { color: #ccc !important; background: transparent !important; }
        .section-tab.active {
            color: #fff !important;
            border-bottom: 2px solid #fff !important;
            font-weight: 600 !important;
            background: transparent !important;
        }

        .add-tab-btn {
            padding: 0.4rem 0.85rem !important;
            background: transparent !important;
            color: #3a3a3a !important;
            border: 1px dashed #2a2a2a !important;
            border-radius: 4px !important;
            font-size: 0.76rem !important;
            cursor: pointer !important;
            white-space: nowrap;
            width: auto !important;
            height: auto !important;
            min-width: unset !important;
            font-weight: 400 !important;
            align-self: center;
            margin-left: 0.5rem;
        }
        .add-tab-btn:hover { color: #888 !important; border-color: #444 !important; background: transparent !important; }

        .section-panel { display: none; padding-top: 1.25rem; }
        .section-panel.active { display: block; }

        .section-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .section-title-input {
            flex: 1;
            min-width: 160px;
            padding: 0.48rem 0.75rem;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            font-size: 0.9rem;
            border-radius: 4px;
            outline: none;
        }
        .section-title-input:focus { border-color: #555; }

        .enabled-label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            color: #555;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .enabled-label input[type="checkbox"] {
            accent-color: #fff;
            width: 13px;
            height: 13px;
            cursor: pointer;
        }

        .section-html-btn {
            padding: 0.35rem 0.75rem !important;
            background: transparent !important;
            color: #4a4a4a !important;
            border: 1px solid #2a2a2a !important;
            border-radius: 4px !important;
            font-size: 0.76rem !important;
            cursor: pointer !important;
            width: auto !important; height: auto !important; min-width: unset !important;
            font-weight: 400 !important;
        }
        .section-html-btn:hover { color: #999 !important; background: transparent !important; }
        .section-html-btn.html-on { color: #fff !important; border-color: #555 !important; }

        .section-delete-btn {
            padding: 0.35rem 0.75rem !important;
            background: transparent !important;
            color: #4a2a2a !important;
            border: 1px solid #3a1a1a !important;
            border-radius: 4px !important;
            font-size: 0.76rem !important;
            cursor: pointer !important;
            width: auto !important; height: auto !important; min-width: unset !important;
            font-weight: 400 !important;
        }
        .section-delete-btn:hover { color: #ff4444 !important; border-color: #ff4444 !important; background: transparent !important; }

        .raw-html-area {
            display: none;
            width: 100%;
            min-height: 220px;
            background: #070707;
            border: 1px solid #333;
            border-top: none;
            border-radius: 0 0 4px 4px;
            color: #7ec8e3;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.79rem;
            line-height: 1.55;
            padding: 1rem;
            resize: vertical;
            outline: none;
            tab-size: 2;
        }

        /* reset global button styles inside Quill toolbar */
        .ql-toolbar.ql-snow button {
            padding: 3px 5px !important;
            background: transparent !important;
            color: inherit !important;
            border: none !important;
            font-size: inherit !important;
            font-weight: normal !important;
            width: 28px !important;
            height: 24px !important;
            min-width: unset !important;
        }
    </style>
</head>
<body>

<header>
    <span class="logo">GLAS<span class="slash">/</span><span class="sub">furnace</span></span>
</header>

<div id="auth">
    <input type="password" id="pw" placeholder="password" autocomplete="current-password" />
    <br>
    <button onclick="unlock()">Enter</button>
</div>

<div id="app">
    <!-- Media upload -->
    <button id="upload-btn" onclick="openWidget()">+ Upload image or video</button>
    <div id="status"></div>
    <div class="gallery" id="gallery"></div>

    <!-- Glass settings -->
    <p class="section-title">Glass settings</p>

    <!-- Preview -->
    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
        <defs>
            <filter id="preview-glass" x="-15%" y="-30%" width="130%" height="160%">
                <feTurbulence type="fractalNoise" baseFrequency="0.016 0.020" numOctaves="3" seed="9" result="noise" />
                <feDisplacementMap id="pf-displacement" in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G" result="displaced" />
                <feGaussianBlur id="pf-softness" in="displaced" stdDeviation="1.4" result="softened" />
                <feComposite in="softened" in2="SourceGraphic" operator="in" result="clipped" />
                <feGaussianBlur id="pf-extra-blur" in="clipped" stdDeviation="0" />
            </filter>
        </defs>
    </svg>

    <div id="preview-wrap">
        <div id="preview-bg"></div>
        <div id="preview-center">
            <h2 id="preview-glas">GLAS</h2>
        </div>
        <div class="pattern-btns">
            <button class="pattern-btn active" id="pb-0" onclick="setPattern(0)"></button>
            <button class="pattern-btn"        id="pb-1" onclick="setPattern(1)"></button>
        </div>
    </div>
    <div class="sliders">
        <div class="slider-row">
            <div class="slider-label">Strength <span id="v-strength">30</span></div>
            <input type="range" id="s-strength" min="0" max="80" step="1" value="30">
        </div>
        <div class="slider-row">
            <div class="slider-label">Softness <span id="v-softness">1.4</span></div>
            <input type="range" id="s-softness" min="0" max="10" step="0.1" value="1.4">
        </div>
        <div class="slider-row">
            <div class="slider-label">Extra blur <span id="v-extraBlur">0</span></div>
            <input type="range" id="s-extraBlur" min="0" max="20" step="0.5" value="0">
        </div>
        <div class="slider-row">
            <div class="slider-label">Tinting <span id="v-tinting">0.16</span></div>
            <input type="range" id="s-tinting" min="0" max="1" step="0.01" value="0.16">
        </div>
        <div class="slider-row">
            <div class="slider-label">Contrast <span id="v-contrast">100</span></div>
            <input type="range" id="s-contrast" min="50" max="200" step="1" value="100">
        </div>
        <div class="slider-row">
            <div class="slider-label">Brightness <span id="v-brightness">100</span></div>
            <input type="range" id="s-brightness" min="50" max="200" step="1" value="100">
        </div>
        <div class="slider-row">
            <div class="slider-label">Invert <span id="v-invert">0</span></div>
            <input type="range" id="s-invert" min="0" max="100" step="1" value="0">
        </div>
        <div class="slider-row">
            <div class="slider-label">Edge specularity <span id="v-edgeSpecularity">0.18</span></div>
            <input type="range" id="s-edgeSpecularity" min="0" max="1" step="0.01" value="0.18">
        </div>
    </div>
    <div class="glass-actions">
        <button id="save-btn" onclick="saveConfig()">Save glass settings</button>
        <button id="reset-btn" onclick="resetConfig()">Reset to defaults</button>
        <span id="cfg-status"></span>
    </div>

    <!-- Sections manager -->
    <p class="section-title" style="margin-top:4rem">Page sections</p>
    <div class="section-tabs" id="section-tabs"></div>
    <div id="section-panels"></div>
    <div class="glass-actions" style="margin-top:1.5rem;margin-bottom:4rem">
        <button onclick="saveSections()">Save sections</button>
        <span id="sections-status"></span>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
    const CLOUD_NAME    = 'dpr7dmhgo';
    const UPLOAD_PRESET = 'glas_upload';
    const PASSWORD      = 'glas2025';
    const SESSION_KEY   = 'glas_session';
    const SESSION_TTL   = 15 * 60 * 1000;

    const TOOLBAR_CFG = [
        ['bold', 'italic', 'underline'],
        [{ header: [1, 2, false] }],
        [{ font: [] }],
        [{ color: [] }],
        ['link'],
        ['clean'],
    ];

    // Quill instances are created dynamically per section
    const quills = {};

    const DEFAULTS = {
        strength: 30, softness: 1.4, extraBlur: 0, tinting: 0.16,
        contrast: 100, brightness: 100, invert: 0, edgeSpecularity: 0.18
    };

    // --- Session ---
    function isSessionValid() {
        const t = localStorage.getItem(SESSION_KEY);
        return t && (Date.now() - parseInt(t)) < SESSION_TTL;
    }

    function showApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display  = 'block';
        loadGallery();
        loadConfig();
        loadSections();
    }

    function unlock() {
        const pw = document.getElementById('pw').value;
        if (pw === PASSWORD) {
            localStorage.setItem(SESSION_KEY, Date.now().toString());
            showApp();
        } else {
            document.getElementById('pw').style.borderColor = '#ff4444';
        }
    }

    document.getElementById('pw').addEventListener('keydown', e => {
        if (e.key === 'Enter') unlock();
    });

    // Auto-login if session still valid
    if (isSessionValid()) {
        showApp();
    }

    // --- Gallery ---
    async function loadGallery() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        try {
            const res = await fetch('/manifest.json');
            const manifest = await res.json();
            if (!manifest.length) {
                gallery.innerHTML = '<p class="empty">No media yet — upload something.</p>';
                return;
            }
            manifest.forEach(item => {
                const el = document.createElement('div');
                el.className = 'gallery-item';
                const media = item.type === 'video'
                    ? `<video src="${item.url}" muted loop autoplay playsinline></video>`
                    : `<img src="${item.url}" alt="" />`;
                el.innerHTML = `${media}<span class="badge">${item.type}</span><button class="delete-btn" onclick="deleteItem('${item.url}', this)">Remove</button>`;
                gallery.appendChild(el);
            });
        } catch(e) {
            gallery.innerHTML = '<p class="empty">Could not load gallery.</p>';
        }
    }

    let widget;
    function openWidget() {
        if (!widget) {
            widget = cloudinary.createUploadWidget({
                cloudName: CLOUD_NAME,
                uploadPreset: UPLOAD_PRESET,
                sources: ['local', 'camera'],
                resourceType: 'auto',
                multiple: true,
                clientAllowedFormats: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'mp4', 'mov', 'webm'],
            }, async (error, result) => {
                if (error) { setStatus('Upload error: ' + error.message, 'error'); return; }
                if (result.event === 'success') {
                    const url  = result.info.secure_url;
                    const type = result.info.resource_type === 'video' ? 'video' : 'image';
                    setStatus('Saving…');
                    await addToManifest(url, type);
                }
            });
        }
        widget.open();
    }

    async function addToManifest(url, type) {
        try {
            const res = await fetch('/functions/update-manifest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, type }),
            });
            if (res.ok) {
                setStatus('Saved! Reloading…', 'success');
                setTimeout(loadGallery, 1500);
            } else {
                setStatus('Error: ' + await res.text(), 'error');
            }
        } catch(e) { setStatus('Error: ' + e.message, 'error'); }
    }

    async function deleteItem(url, btn) {
        if (!confirm('Remove this from the site?')) return;
        btn.textContent = '…';
        btn.disabled = true;
        try {
            const res = await fetch('/functions/delete-media', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url }),
            });
            if (res.ok) {
                btn.closest('.gallery-item').remove();
                setStatus('Removed.', 'success');
            } else {
                setStatus('Error: ' + await res.text(), 'error');
                btn.textContent = 'Remove';
                btn.disabled = false;
            }
        } catch(e) {
            setStatus('Error: ' + e.message, 'error');
            btn.textContent = 'Remove';
            btn.disabled = false;
        }
    }

    function setStatus(msg, cls) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = cls === 'error' ? 'error-msg' : cls === 'success' ? 'success-msg' : '';
    }

    // --- Glass settings ---
    const SLIDERS = ['strength', 'softness', 'extraBlur', 'tinting', 'contrast', 'brightness', 'invert', 'edgeSpecularity'];

    // Wire up live value display + preview update
    SLIDERS.forEach(key => {
        const input = document.getElementById(`s-${key}`);
        const val   = document.getElementById(`v-${key}`);
        input.addEventListener('input', () => { val.textContent = input.value; updatePreview(); });
    });

    async function loadConfig() {
        try {
            const res = await fetch('/config.json');
            const cfg = await res.json();
            applySliders(cfg);
        } catch(e) {
            applySliders(DEFAULTS);
        }
        document.fonts.ready.then(updatePreview);
    }

    function applySliders(cfg) {
        SLIDERS.forEach(key => {
            const val = cfg[key] ?? DEFAULTS[key];
            const input = document.getElementById(`s-${key}`);
            const label = document.getElementById(`v-${key}`);
            input.value    = val;
            label.textContent = val;
        });
    }

    function readSliders() {
        const cfg = {};
        SLIDERS.forEach(key => {
            cfg[key] = parseFloat(document.getElementById(`s-${key}`).value);
        });
        return cfg;
    }

    // --- Preview ---
    const PATTERNS = [
        'radial-gradient(ellipse at 20% 35%, #ff6b35 0%, #ffcc02 25%, #e8f5b0 48%, #4ecdc4 72%, #2d6a8a 100%)',
        'radial-gradient(ellipse at 78% 65%, #c026d3 0%, #7c3aed 28%, #2563eb 52%, #059669 76%, #ca8a04 100%)',
    ];
    let currentPattern = 0;

    function setPattern(idx) {
        currentPattern = idx;
        document.querySelectorAll('.pattern-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        applyPreviewBg();
        setPreviewTextPos();
    }

    function applyPreviewBg() {
        document.getElementById('preview-bg').style.background = PATTERNS[currentPattern];
    }

    function setPreviewTextPos() {
        const glas = document.getElementById('preview-glas');
        const wrap = document.getElementById('preview-wrap');
        const wrapRect = wrap.getBoundingClientRect();
        const glassRect = glas.getBoundingClientRect();
        glas.style.backgroundImage    = PATTERNS[currentPattern];
        glas.style.backgroundSize     = `${wrapRect.width}px ${wrapRect.height}px`;
        glas.style.backgroundPosition = `${wrapRect.left - glassRect.left}px ${wrapRect.top - glassRect.top}px`;
    }

    function updatePreview() {
        const cfg = readSliders();
        document.getElementById('pf-displacement').setAttribute('scale', cfg.strength);
        document.getElementById('pf-softness').setAttribute('stdDeviation', cfg.softness);
        document.getElementById('pf-extra-blur').setAttribute('stdDeviation', cfg.extraBlur);
        document.documentElement.style.setProperty('--preview-tinting', cfg.tinting);
        document.documentElement.style.setProperty('--preview-edge-spec', cfg.edgeSpecularity);
        const glas = document.getElementById('preview-glas');
        glas.style.filter = `url(#preview-glass) contrast(${cfg.contrast}%) brightness(${cfg.brightness}%) invert(${cfg.invert}%)`;
        setPreviewTextPos();
    }

    // Init preview
    applyPreviewBg();
    PATTERNS.forEach((grad, i) => { document.getElementById(`pb-${i}`).style.background = grad; });
    window.addEventListener('resize', setPreviewTextPos);

    async function saveConfig() {
        const cfg = readSliders();
        setCfgStatus('Saving…');
        try {
            const res = await fetch('/functions/save-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cfg),
            });
            if (res.ok) {
                setCfgStatus('Saved!', 'success');
            } else {
                setCfgStatus('Error: ' + await res.text(), 'error');
            }
        } catch(e) { setCfgStatus('Error: ' + e.message, 'error'); }
    }

    function resetConfig() {
        applySliders(DEFAULTS);
        updatePreview();
    }

    function setCfgStatus(msg, cls) {
        const el = document.getElementById('cfg-status');
        el.textContent = msg;
        el.className = cls === 'error' ? 'error-msg' : cls === 'success' ? 'success-msg' : '';
        if (cls === 'success') setTimeout(() => { el.textContent = ''; }, 3000);
    }

    // --- Sections manager ---
    let sections = [];
    let activeTabId = null;

    function escHtml(s) {
        return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadSections() {
        // Try sections.json first; fall back to migrating old individual files
        try {
            const res = await fetch('/sections.json');
            if (res.ok) {
                const data = await res.json();
                if (Array.isArray(data) && data.length) {
                    sections = data;
                    renderSections();
                    activateTab(sections[0].id);
                    return;
                }
            }
        } catch(e) {}

        // Migrate from old files
        const fetchSafe = async url => {
            try { const r = await fetch(url); return r.ok ? await r.text() : ''; } catch(e) { return ''; }
        };
        const [imp, con, read] = await Promise.all([
            fetchSafe('/impressum.html'),
            fetchSafe('/contact.html'),
            fetchSafe('/content.html'),
        ]);
        sections = [
            { id: 'impressum', title: 'Impressum', content: imp,  enabled: true },
            { id: 'contact',   title: 'Contact',   content: con,  enabled: true },
            { id: 'read',      title: 'Read',       content: read, enabled: true },
        ];
        renderSections();
        activateTab(sections[0].id);
    }

    function renderSections() {
        const tabsEl   = document.getElementById('section-tabs');
        const panelsEl = document.getElementById('section-panels');

        // Sync quill content before re-render
        sections.forEach(s => { if (quills[s.id]) s.content = quills[s.id].root.innerHTML; });

        // Tabs
        tabsEl.innerHTML = '';
        sections.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'section-tab' + (s.id === activeTabId ? ' active' : '');
            btn.textContent = s.title || 'Untitled';
            btn.onclick = () => activateTab(s.id);
            tabsEl.appendChild(btn);
        });
        if (sections.length < 7) {
            const add = document.createElement('button');
            add.className = 'add-tab-btn';
            add.textContent = '+ Add section';
            add.onclick = addSection;
            tabsEl.appendChild(add);
        }

        // Remove panels for deleted sections
        panelsEl.querySelectorAll('.section-panel').forEach(el => {
            if (!sections.find(s => s.id === el.dataset.sid)) el.remove();
        });

        // Create/update panels
        sections.forEach(s => {
            let panel = document.getElementById(`panel-${s.id}`);
            if (!panel) {
                panel = document.createElement('div');
                panel.className = 'section-panel';
                panel.id = `panel-${s.id}`;
                panel.dataset.sid = s.id;
                panel.innerHTML = `
                    <div class="section-meta">
                        <input class="section-title-input" type="text" value="${escHtml(s.title)}"
                               placeholder="Menu label"
                               oninput="updateSectionTitle('${s.id}', this.value)">
                        <label class="enabled-label">
                            <input type="checkbox" ${s.enabled !== false ? 'checked' : ''}
                                   onchange="updateSectionEnabled('${s.id}', this.checked)"> Enabled
                        </label>
                        <button class="section-html-btn" id="htmlbtn-${s.id}"
                                onclick="toggleHtmlView('${s.id}')">HTML</button>
                        <button class="section-delete-btn"
                                onclick="deleteSection('${s.id}')">Delete</button>
                    </div>
                    <div id="editor-${s.id}"></div>
                    <textarea class="raw-html-area" id="rawhtml-${s.id}" spellcheck="false"></textarea>
                `;
                panelsEl.appendChild(panel);

                // Init Quill
                const q = new Quill(`#editor-${s.id}`, {
                    theme: 'snow',
                    placeholder: 'Section content…',
                    modules: { toolbar: TOOLBAR_CFG },
                });
                if (s.content && s.content.trim()) q.clipboard.dangerouslyPasteHTML(s.content);
                quills[s.id] = q;
            } else {
                // Sync title input
                const inp = panel.querySelector('.section-title-input');
                if (inp) inp.value = s.title;
            }
            panel.classList.toggle('active', s.id === activeTabId);
        });
    }

    function activateTab(id) {
        activeTabId = id;
        document.querySelectorAll('.section-tab').forEach((btn, i) => {
            btn.classList.toggle('active', sections[i]?.id === id);
        });
        document.querySelectorAll('.section-panel').forEach(el => {
            el.classList.toggle('active', el.id === `panel-${id}`);
        });
    }

    function updateSectionTitle(id, value) {
        const s = sections.find(s => s.id === id);
        if (!s) return;
        s.title = value;
        // update tab label live
        document.querySelectorAll('.section-tab').forEach((btn, i) => {
            if (sections[i]?.id === id) btn.textContent = value || 'Untitled';
        });
    }

    function updateSectionEnabled(id, checked) {
        const s = sections.find(s => s.id === id);
        if (s) s.enabled = checked;
    }

    function addSection() {
        if (sections.length >= 7) return;
        const id = 'sec_' + Date.now();
        sections.push({ id, title: 'New section', content: '', enabled: true });
        activeTabId = id;
        renderSections();
        setTimeout(() => {
            const inp = document.querySelector(`#panel-${id} .section-title-input`);
            if (inp) { inp.focus(); inp.select(); }
        }, 50);
    }

    function deleteSection(id) {
        if (!confirm('Delete this section? This cannot be undone until you save.')) return;
        const idx = sections.findIndex(s => s.id === id);
        if (idx === -1) return;
        sections.splice(idx, 1);
        delete quills[id];
        document.getElementById(`panel-${id}`)?.remove();
        if (activeTabId === id) {
            activeTabId = sections.length ? sections[Math.max(0, idx - 1)].id : null;
        }
        renderSections();
        if (activeTabId) activateTab(activeTabId);
    }

    function toggleHtmlView(id) {
        const editorEl = document.getElementById(`editor-${id}`);
        const textarea = document.getElementById(`rawhtml-${id}`);
        const btn      = document.getElementById(`htmlbtn-${id}`);
        const q        = quills[id];
        const isHtmlOn = btn.classList.contains('html-on');

        if (isHtmlOn) {
            // HTML → Rich text
            if (q) q.clipboard.dangerouslyPasteHTML(textarea.value);
            textarea.style.display = 'none';
            editorEl.style.display = '';
            btn.classList.remove('html-on');
            btn.textContent = 'HTML';
        } else {
            // Rich text → HTML
            textarea.value = q ? q.root.innerHTML : '';
            editorEl.style.display = 'none';
            textarea.style.display = 'block';
            btn.classList.add('html-on');
            btn.textContent = 'Rich text';
        }
    }

    async function saveSections() {
        // Collect current content from active view (rich text or HTML)
        sections.forEach(s => {
            const textarea = document.getElementById(`rawhtml-${s.id}`);
            const btn      = document.getElementById(`htmlbtn-${s.id}`);
            if (btn && btn.classList.contains('html-on')) {
                s.content = textarea ? textarea.value : '';
            } else if (quills[s.id]) {
                s.content = quills[s.id].root.innerHTML;
            }
        });

        setSectionsStatus('Saving…');
        try {
            const res = await fetch('/functions/save-sections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sections),
            });
            if (res.ok) {
                setSectionsStatus('Saved!', 'success');
            } else {
                setSectionsStatus('Error: ' + await res.text(), 'error');
            }
        } catch(e) { setSectionsStatus('Error: ' + e.message, 'error'); }
    }

    function setSectionsStatus(msg, cls) {
        const el = document.getElementById('sections-status');
        el.textContent = msg;
        el.className = cls === 'error' ? 'error-msg' : cls === 'success' ? 'success-msg' : '';
        if (cls === 'success') setTimeout(() => { el.textContent = ''; }, 3000);
    }
</script>
</body>
</html>
