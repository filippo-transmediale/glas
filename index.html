<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>GLAS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --tinting: 0.16;
            --edge-spec: 0.18;
            --bg-color: #ffffff;
        }

        html {
            background: var(--bg-color);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            background: var(--bg-color);
        }

        #app {
            position: relative;
            height: 100svh;
            overflow: hidden;
        }

        #bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 0;
        }

        #text-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            line-height: 1;
        }

        /* Iridescent outline layer */
        #text-wrap::before {
            content: 'GLAS';
            position: absolute;
            inset: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 2px rgba(160, 220, 255, var(--edge-spec));
            filter: blur(0.5px);
            pointer-events: none;
        }

        h1 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            user-select: none;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: rgba(255, 255, 255, var(--tinting));
            -webkit-text-stroke: 1px rgba(200, 235, 255, 0.12);
            background-repeat: no-repeat;
            filter: url(#liquid-glass);
        }

        h1.plain {
            -webkit-background-clip: unset;
            background-clip: unset;
            -webkit-text-fill-color: rgba(255, 255, 255, var(--tinting));
            background-image: none !important;
            filter: none;
        }

        /* Scroll hint */
        #scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            z-index: 2;
            pointer-events: none;
            animation: scrollHintPulse 2.8s ease-in-out infinite;
        }

        @keyframes scrollHintPulse {
            0%   { opacity: 0; transform: translateX(-50%) translateY(0); }
            20%  { opacity: 0.35; }
            50%  { opacity: 0.35; transform: translateX(-50%) translateY(6px); }
            80%  { opacity: 0.35; }
            100% { opacity: 0; transform: translateX(-50%) translateY(0); }
        }

        #scroll-hint.hidden {
            animation: none;
            opacity: 0;
        }

        /* Footer */
        #footer {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            padding: 2rem;
            min-height: 80px;
        }

        #footer a {
            color: #fff;
            text-decoration: none;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        #footer a:hover,
        #footer a.active {
            opacity: 1;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        #footer a.active { font-weight: 700; }

        /* Content panel */
        #content-panel {
            display: none;
            padding: 1.5rem 2rem 5rem;
        }

        #panel-box {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.45),
                0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 80px 30px rgba(255, 255, 255, 0.12);
        }

        #panel-content {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.6;
            color: #000;
        }

        #panel-content p { margin-bottom: 1em; }
        #panel-content p:last-child { margin-bottom: 0; }
        #panel-content a { color: inherit; text-decoration: underline; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
        <defs>
            <filter id="liquid-glass" x="-15%" y="-30%" width="130%" height="160%">
                <feTurbulence
                    id="f-turbulence"
                    type="fractalNoise"
                    baseFrequency="0.016 0.020"
                    numOctaves="3"
                    seed="9"
                    result="noise" />
                <feDisplacementMap
                    id="f-displacement"
                    in="SourceGraphic"
                    in2="noise"
                    scale="30"
                    xChannelSelector="R"
                    yChannelSelector="G"
                    result="displaced" />
                <feGaussianBlur
                    id="f-softness"
                    in="displaced"
                    stdDeviation="1.4"
                    result="softened" />
                <feComposite
                    in="softened"
                    in2="SourceGraphic"
                    operator="in"
                    result="clipped" />
                <feGaussianBlur
                    id="f-extra-blur"
                    in="clipped"
                    stdDeviation="0" />
            </filter>
        </defs>
    </svg>

    <div id="app">
        <img id="bg" crossorigin="anonymous" alt="" />
        <video id="bg-video" autoplay muted loop playsinline></video>

        <div id="text-wrap">
            <h1 id="glas" class="plain">GLAS</h1>
        </div>

        <div id="scroll-hint" aria-hidden="true">
            <svg width="24" height="16" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2L12 13L22 2" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </div>

    <footer id="footer">
        <a data-key="impressum" onclick="showPanel('impressum')">Impressum</a>
        <a data-key="contact"   onclick="showPanel('contact')">Contact</a>
        <a data-key="read"      onclick="showPanel('read')">Read</a>
    </footer>

    <div id="content-panel">
        <div id="panel-box">
            <div id="panel-content"></div>
        </div>
    </div>

    <script>
        async function loadConfig() {
            try {
                const res = await fetch('/config.json');
                return await res.json();
            } catch (e) { return {}; }
        }

        function applyConfig(cfg) {
            document.getElementById('f-displacement')?.setAttribute('scale', cfg.strength ?? 30);
            document.getElementById('f-softness')?.setAttribute('stdDeviation', cfg.softness ?? 1.4);
            document.getElementById('f-extra-blur')?.setAttribute('stdDeviation', cfg.extraBlur ?? 0);

            document.documentElement.style.setProperty('--tinting', cfg.tinting ?? 0.16);
            document.documentElement.style.setProperty('--edge-spec', cfg.edgeSpecularity ?? 0.18);

            window._glasCfg = cfg;
        }

        function getFilterStr(cfg) {
            const c = cfg.contrast    ?? 100;
            const b = cfg.brightness  ?? 100;
            const i = cfg.invert      ?? 0;
            return `url(#liquid-glass) contrast(${c}%) brightness(${b}%) invert(${i}%)`;
        }

        function extractBgColor(imgEl) {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 10; canvas.height = 10;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgEl, 0, 0, 10, 10);
                const data = ctx.getImageData(0, 0, 10, 10).data;
                let r = 0, g = 0, b = 0;
                for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
                r = Math.round(r / 100); g = Math.round(g / 100); b = Math.round(b / 100);
                const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
                document.documentElement.style.setProperty('--bg-color', hex);
                document.querySelector('meta[name="theme-color"]').setAttribute('content', hex);
            } catch(e) {}
        }

        async function init() {
            const cfg = await loadConfig();
            applyConfig(cfg);

            // Load sections and render footer nav
            let sections = [];
            try {
                const res = await fetch('/sections.json');
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data) && data.length) sections = data;
                }
            } catch(e) {}

            // Fallback: default stubs so footer links always work
            if (!sections.length) {
                sections = [
                    { id: 'impressum', title: 'Impressum', enabled: true },
                    { id: 'contact',   title: 'Contact',   enabled: true },
                    { id: 'read',      title: 'Read',       enabled: true },
                ];
            }

            window._sections = sections;

            const footer = document.getElementById('footer');
            const enabled = sections.filter(s => s.enabled !== false);
            footer.innerHTML = enabled
                .map(s => `<a data-key="${s.id}" onclick="showPanel('${s.id}')">${escHtml(s.title)}</a>`)
                .join('');

            // Load manifest and bg
            let manifest = [];
            try {
                const res = await fetch('/manifest.json');
                manifest = await res.json();
            } catch (e) { return; }

            if (!manifest.length) return;

            const item = manifest[Math.floor(Math.random() * manifest.length)];

            if (item.type === 'video') {
                const vid = document.getElementById('bg-video');
                vid.src = item.url;
                vid.style.display = 'block';
                document.getElementById('glas').classList.add('plain');
            } else {
                const smartUrl = cloudinarySmartCrop(item.url);
                const img = document.getElementById('bg');
                img.onload = () => {
                    extractBgColor(img);
                    applyGlassText(smartUrl, cfg);
                };
                img.src = smartUrl;
            }
        }

        function escHtml(s) {
            return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function cloudinarySmartCrop(url) {
            if (!url.includes('res.cloudinary.com')) return url;
            const w = window.innerWidth  * window.devicePixelRatio | 0;
            const h = window.innerHeight * window.devicePixelRatio | 0;
            return url.replace('/upload/', `/upload/c_fill,g_auto,w_${w},h_${h}/`);
        }

        function applyGlassText(url, cfg) {
            const h1 = document.getElementById('glas');
            h1.classList.remove('plain');
            h1.style.filter = getFilterStr(cfg);

            function setPos() {
                const rect = h1.getBoundingClientRect();
                h1.style.backgroundImage    = `url('${url}')`;
                h1.style.backgroundSize     = `${window.innerWidth}px ${window.innerHeight}px`;
                h1.style.backgroundPosition = `-${rect.left}px -${rect.top}px`;
            }

            document.fonts.ready.then(() => {
                setPos();
                window.addEventListener('resize', setPos);
                window.addEventListener('scroll', setPos, { passive: true });
            });
        }

        // Scroll hint
        function updateScrollHint() {
            const scrolled = window.scrollY > 10;
            document.getElementById('scroll-hint').classList.toggle('hidden', scrolled);
        }
        window.addEventListener('scroll', updateScrollHint, { passive: true });

        // Panel
        let activeKey = null;

        async function showPanel(key) {
            const panel   = document.getElementById('content-panel');
            const content = document.getElementById('panel-content');

            // toggle off if same key clicked again
            if (activeKey === key) {
                panel.style.display = 'none';
                document.querySelectorAll('#footer a').forEach(a => a.classList.remove('active'));
                activeKey = null;
                return;
            }

            // set active nav state
            document.querySelectorAll('#footer a').forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`#footer a[data-key="${key}"]`);
            if (link) link.classList.add('active');
            activeKey = key;

            // show panel and scroll so footer sits ~50px from top
            panel.style.display = 'block';
            window.scrollTo({
                top: Math.max(0, document.getElementById('footer').offsetTop - 50),
                behavior: 'smooth',
            });

            // get content from sections data
            const section = (window._sections || []).find(s => s.id === key);
            if (section && section.content != null) {
                content.innerHTML = section.content || '';
            } else {
                // fallback: fetch from legacy individual files
                const fileMap = { impressum: '/impressum.html', contact: '/contact.html', read: '/content.html' };
                content.innerHTML = '';
                const url = fileMap[key];
                if (url) {
                    try {
                        const r = await fetch(url);
                        content.innerHTML = r.ok ? await r.text() : '';
                    } catch(e) {}
                }
            }
        }

        init();
    </script>
</body>
</html>
