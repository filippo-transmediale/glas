<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>GLAS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --tinting: 0.16;
            --edge-spec: 0.18;
            --bg-color: #ffffff;
        }

        html {
            background: var(--bg-color);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            background: var(--bg-color);
        }

        #app {
            position: relative;
            height: 100svh;
            overflow: hidden;
        }

        #bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 0;
        }

        #text-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            line-height: 1;
        }

        /* Iridescent outline layer */
        #text-wrap::before {
            content: 'GLAS';
            position: absolute;
            inset: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 2px rgba(160, 220, 255, var(--edge-spec));
            filter: blur(0.5px);
            pointer-events: none;
        }

        h1 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            user-select: none;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: rgba(255, 255, 255, var(--tinting));
            -webkit-text-stroke: 1px rgba(200, 235, 255, 0.12);
            background-repeat: no-repeat;
            filter: url(#liquid-glass);
        }

        h1.plain {
            -webkit-background-clip: unset;
            background-clip: unset;
            -webkit-text-fill-color: rgba(255, 255, 255, var(--tinting));
            background-image: none !important;
            filter: none;
        }

        /* Scroll hint */
        #scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            z-index: 2;
            pointer-events: none;
            animation: scrollHintPulse 2.8s ease-in-out infinite;
        }

        @keyframes scrollHintPulse {
            0%   { opacity: 0; transform: translateX(-50%) translateY(0); }
            20%  { opacity: 0.35; }
            50%  { opacity: 0.35; transform: translateX(-50%) translateY(6px); }
            80%  { opacity: 0.35; }
            100% { opacity: 0; transform: translateX(-50%) translateY(0); }
        }

        #scroll-hint.hidden {
            animation: none;
            opacity: 0;
        }

        /* Footer */
        #footer {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            padding: 2rem;
            min-height: 80px;
        }

        #footer a {
            color: #fff;
            text-decoration: none;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        #footer a:hover { opacity: 1; }

        /* Overlay */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #overlay-inner {
            max-width: 800px;
            width: 100%;
            margin: auto;
            padding: 4rem 2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        #overlay-content {
            width: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.45;
            color: #000;
            text-align: center;
        }

        #overlay-content p { margin-bottom: 1em; }
        #overlay-content p:last-child { margin-bottom: 0; }
        #overlay-content a { color: inherit; text-decoration: underline; }

        /* Close button */
        #overlay-close {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 20;
            background: none;
            border: none;
            color: #000;
            text-shadow: 0 1px 6px rgba(255,255,255,0.4);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: 400;
            line-height: 1;
            cursor: pointer;
            padding: 0;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
        <defs>
            <filter id="liquid-glass" x="-15%" y="-30%" width="130%" height="160%">
                <feTurbulence
                    id="f-turbulence"
                    type="fractalNoise"
                    baseFrequency="0.016 0.020"
                    numOctaves="3"
                    seed="9"
                    result="noise" />
                <feDisplacementMap
                    id="f-displacement"
                    in="SourceGraphic"
                    in2="noise"
                    scale="30"
                    xChannelSelector="R"
                    yChannelSelector="G"
                    result="displaced" />
                <feGaussianBlur
                    id="f-softness"
                    in="displaced"
                    stdDeviation="1.4"
                    result="softened" />
                <feComposite
                    in="softened"
                    in2="SourceGraphic"
                    operator="in"
                    result="clipped" />
                <feGaussianBlur
                    id="f-extra-blur"
                    in="clipped"
                    stdDeviation="0" />
            </filter>
        </defs>
    </svg>

    <div id="app">
        <img id="bg" crossorigin="anonymous" alt="" />
        <video id="bg-video" autoplay muted loop playsinline></video>

        <div id="text-wrap">
            <h1 id="glas" class="plain">GLAS</h1>
        </div>

        <div id="scroll-hint" aria-hidden="true">
            <svg width="24" height="16" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2L12 13L22 2" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </div>

    <footer id="footer">
        <a onclick="openOverlay('impressum')">Impressum</a>
        <a onclick="openOverlay('contact')">Contact</a>
        <a onclick="openOverlay('read')">Read</a>
    </footer>

    <div id="overlay">
        <div id="overlay-inner">
            <div id="overlay-content"></div>
        </div>
        <button id="overlay-close" onclick="closeOverlay()" aria-label="Close">+</button>
    </div>

    <script>
        async function loadConfig() {
            try {
                const res = await fetch('/config.json');
                return await res.json();
            } catch (e) { return {}; }
        }

        function applyConfig(cfg) {
            document.getElementById('f-displacement')?.setAttribute('scale', cfg.strength ?? 30);
            document.getElementById('f-softness')?.setAttribute('stdDeviation', cfg.softness ?? 1.4);
            document.getElementById('f-extra-blur')?.setAttribute('stdDeviation', cfg.extraBlur ?? 0);

            document.documentElement.style.setProperty('--tinting', cfg.tinting ?? 0.16);
            document.documentElement.style.setProperty('--edge-spec', cfg.edgeSpecularity ?? 0.18);

            window._glasCfg = cfg;
        }

        function getFilterStr(cfg) {
            const c = cfg.contrast    ?? 100;
            const b = cfg.brightness  ?? 100;
            const i = cfg.invert      ?? 0;
            return `url(#liquid-glass) contrast(${c}%) brightness(${b}%) invert(${i}%)`;
        }

        function extractBgColor(imgEl) {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 10; canvas.height = 10;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgEl, 0, 0, 10, 10);
                const data = ctx.getImageData(0, 0, 10, 10).data;
                let r = 0, g = 0, b = 0;
                for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
                r = Math.round(r / 100); g = Math.round(g / 100); b = Math.round(b / 100);
                const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
                document.documentElement.style.setProperty('--bg-color', hex);
                document.querySelector('meta[name="theme-color"]').setAttribute('content', hex);
            } catch(e) {}
        }

        async function init() {
            const cfg = await loadConfig();
            applyConfig(cfg);

            let manifest = [];
            try {
                const res = await fetch('/manifest.json');
                manifest = await res.json();
            } catch (e) { return; }

            if (!manifest.length) return;

            const item = manifest[Math.floor(Math.random() * manifest.length)];

            if (item.type === 'video') {
                const vid = document.getElementById('bg-video');
                vid.src = item.url;
                vid.style.display = 'block';
                document.getElementById('glas').classList.add('plain');
            } else {
                const smartUrl = cloudinarySmartCrop(item.url);
                const img = document.getElementById('bg');
                img.onload = () => {
                    extractBgColor(img);
                    applyGlassText(smartUrl, cfg);
                };
                img.src = smartUrl;
            }
        }

        function cloudinarySmartCrop(url) {
            if (!url.includes('res.cloudinary.com')) return url;
            const w = window.innerWidth  * window.devicePixelRatio | 0;
            const h = window.innerHeight * window.devicePixelRatio | 0;
            return url.replace('/upload/', `/upload/c_fill,g_auto,w_${w},h_${h}/`);
        }

        function applyGlassText(url, cfg) {
            const h1 = document.getElementById('glas');
            h1.classList.remove('plain');
            h1.style.filter = getFilterStr(cfg);

            function setPos() {
                const rect = h1.getBoundingClientRect();
                h1.style.backgroundImage    = `url('${url}')`;
                h1.style.backgroundSize     = `${window.innerWidth}px ${window.innerHeight}px`;
                h1.style.backgroundPosition = `-${rect.left}px -${rect.top}px`;
            }

            document.fonts.ready.then(() => {
                setPos();
                window.addEventListener('resize', setPos);
                window.addEventListener('scroll', setPos, { passive: true });
            });
        }

        // Scroll hint
        function updateScrollHint() {
            const scrolled = window.scrollY > 10;
            document.getElementById('scroll-hint').classList.toggle('hidden', scrolled);
        }
        window.addEventListener('scroll', updateScrollHint, { passive: true });

        function hideScrollHint() {
            document.getElementById('scroll-hint').classList.add('hidden');
        }

        // Overlay
        const overlayCache = {};

        async function openOverlay(key) {
            const fileMap = {
                impressum: '/impressum.html',
                contact:   '/contact.html',
                read:      '/content.html',
            };
            const overlay = document.getElementById('overlay');
            const content = document.getElementById('overlay-content');

            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
            hideScrollHint();

            if (overlayCache[key] !== undefined) {
                content.innerHTML = overlayCache[key];
                return;
            }

            content.innerHTML = '';
            try {
                const res = await fetch(fileMap[key]);
                const html = res.ok ? await res.text() : '';
                overlayCache[key] = html;
                content.innerHTML = html;
            } catch(e) {
                overlayCache[key] = '';
            }
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
            document.body.style.overflow = '';
            updateScrollHint();
        }

        init();
    </script>
</body>
</html>
