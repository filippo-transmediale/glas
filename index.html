<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLAS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --tinting: 0.16;
            --edge-spec: 0.18;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: var(--vh, 100vh);
            overflow: hidden;
            background: #000;
        }

        #bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 0;
        }

        #text-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            line-height: 1;
        }

        /* Iridescent outline layer */
        #text-wrap::before {
            content: 'GLAS';
            position: absolute;
            inset: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 2px rgba(160, 220, 255, var(--edge-spec));
            filter: blur(0.5px);
            pointer-events: none;
        }

        h1 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
            user-select: none;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: rgba(255, 255, 255, var(--tinting));
            -webkit-text-stroke: 1px rgba(200, 235, 255, 0.12);
            background-repeat: no-repeat;
            filter: url(#liquid-glass);
        }

        h1.plain {
            -webkit-background-clip: unset;
            background-clip: unset;
            -webkit-text-fill-color: rgba(255, 255, 255, var(--tinting));
            background-image: none !important;
            filter: none;
        }

        /* Info overlay */
        #toggle-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 20;
            background: none;
            border: none;
            color: #fff;
            text-shadow: 0 1px 6px rgba(0,0,0,0.5);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: 400;
            line-height: 1;
            cursor: pointer;
            padding: 0;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        #toggle-btn.open {
            transform: rotate(45deg);
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 5;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #overlay-inner {
            max-width: 800px;
            width: 100%;
            margin: auto;
            padding: 4rem 2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        #overlay-content {
            width: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.45;
            color: #000;
            text-align: center;
        }

        #overlay-content p { margin-bottom: 1em; }
        #overlay-content p:last-child { margin-bottom: 0; }
        #overlay-content a { color: inherit; text-decoration: underline; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
        <defs>
            <filter id="liquid-glass" x="-15%" y="-30%" width="130%" height="160%">
                <feTurbulence
                    id="f-turbulence"
                    type="fractalNoise"
                    baseFrequency="0.016 0.020"
                    numOctaves="3"
                    seed="9"
                    result="noise" />
                <feDisplacementMap
                    id="f-displacement"
                    in="SourceGraphic"
                    in2="noise"
                    scale="30"
                    xChannelSelector="R"
                    yChannelSelector="G"
                    result="displaced" />
                <feGaussianBlur
                    id="f-softness"
                    in="displaced"
                    stdDeviation="1.4"
                    result="softened" />
                <feComposite
                    in="softened"
                    in2="SourceGraphic"
                    operator="in"
                    result="clipped" />
                <feGaussianBlur
                    id="f-extra-blur"
                    in="clipped"
                    stdDeviation="0" />
            </filter>
        </defs>
    </svg>

    <img id="bg" alt="" />
    <video id="bg-video" autoplay muted loop playsinline></video>

    <div id="text-wrap">
        <h1 id="glas" class="plain">GLAS</h1>
    </div>

    <button id="toggle-btn" onclick="toggleOverlay()" aria-label="Toggle info">+</button>
    <div id="overlay">
        <div id="overlay-inner">
            <div id="overlay-content"></div>
        </div>
    </div>

    <script>
        // Set --vh to the real visible height (fixes iOS Safari toolbar gap)
        function setVH() {
            document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);

        async function loadConfig() {
            try {
                const res = await fetch('/config.json');
                return await res.json();
            } catch (e) { return {}; }
        }

        function applyConfig(cfg) {
            document.getElementById('f-displacement')?.setAttribute('scale', cfg.strength ?? 30);
            document.getElementById('f-softness')?.setAttribute('stdDeviation', cfg.softness ?? 1.4);
            document.getElementById('f-extra-blur')?.setAttribute('stdDeviation', cfg.extraBlur ?? 0);

            document.documentElement.style.setProperty('--tinting', cfg.tinting ?? 0.16);
            document.documentElement.style.setProperty('--edge-spec', cfg.edgeSpecularity ?? 0.18);

            // Store for later use when glass text is applied
            window._glasCfg = cfg;
        }

        function getFilterStr(cfg) {
            const c = cfg.contrast    ?? 100;
            const b = cfg.brightness  ?? 100;
            const i = cfg.invert      ?? 0;
            return `url(#liquid-glass) contrast(${c}%) brightness(${b}%) invert(${i}%)`;
        }

        async function init() {
            const cfg = await loadConfig();
            applyConfig(cfg);

            let manifest = [];
            try {
                const res = await fetch('/manifest.json');
                manifest = await res.json();
            } catch (e) { return; }

            if (!manifest.length) return;

            const item = manifest[Math.floor(Math.random() * manifest.length)];

            if (item.type === 'video') {
                const vid = document.getElementById('bg-video');
                vid.src = item.url;
                vid.style.display = 'block';
                document.getElementById('glas').classList.add('plain');
            } else {
                const smartUrl = cloudinarySmartCrop(item.url);
                document.getElementById('bg').src = smartUrl;
                applyGlassText(smartUrl, cfg);
            }
        }

        function cloudinarySmartCrop(url) {
            if (!url.includes('res.cloudinary.com')) return url;
            const w = window.innerWidth  * window.devicePixelRatio | 0;
            const h = window.innerHeight * window.devicePixelRatio | 0;
            return url.replace('/upload/', `/upload/c_fill,g_auto,w_${w},h_${h}/`);
        }

        function applyGlassText(url, cfg) {
            const h1 = document.getElementById('glas');
            h1.classList.remove('plain');
            h1.style.filter = getFilterStr(cfg);

            function setPos() {
                const rect = h1.getBoundingClientRect();
                h1.style.backgroundImage    = `url('${url}')`;
                h1.style.backgroundSize     = `${window.innerWidth}px ${window.innerHeight}px`;
                h1.style.backgroundPosition = `-${rect.left}px -${rect.top}px`;
            }

            document.fonts.ready.then(() => {
                setPos();
                window.addEventListener('resize', setPos);
            });
        }

        let overlayLoaded = false;

        async function loadOverlayContent() {
            if (overlayLoaded) return;
            overlayLoaded = true;
            try {
                const res = await fetch('/content.html');
                if (res.ok) {
                    document.getElementById('overlay-content').innerHTML = await res.text();
                }
            } catch(e) {}
        }

        function toggleOverlay() {
            const btn     = document.getElementById('toggle-btn');
            const overlay = document.getElementById('overlay');
            const isOpen  = btn.classList.contains('open');
            btn.classList.toggle('open');
            if (!isOpen) {
                loadOverlayContent();
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
